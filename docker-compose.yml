version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: health_redis
    restart: always
    volumes:
      - data_redis:/data
    networks:
      - healthnet

  backend:
    build:
      context: ./backend
    container_name: health_backend
    restart: always
    env_file:
      - .env
    environment:
      - WAIT_HOST=redis
      - WAIT_PORT=6379
    ports:
      - '8000:8000'
    depends_on:
      - redis
    volumes:
      - ./data/sqlite:/app/data
      - ./data/vector_db:/app/rag/vector_store
      - ./data/logs:/app/logs
    networks:
      - healthnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 5

  nginx:
    image: nginx:stable-alpine
    container_name: health_nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/html:/var/www/certbot
    depends_on:
      - backend
    networks:
      - healthnet

  certbot:
    image: certbot/certbot
    container_name: health_certbot
    volumes:
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/html:/var/www/certbot
    networks:
      - healthnet

volumes:
  data_redis:
  sqlite_data:
  vector_data:
  logs_data:

networks:
  healthnet:
    driver: bridge
